version: '3.8'
services:
  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    volumes:
      - ./docker/minio/cors.json:/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      i=0;
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        i=$$((i+1));
        if [ $$i -ge 30 ]; then echo 'MinIO não ficou pronto'; exit 1; fi;
        echo 'Aguardando MinIO...';
        sleep 1;
      done;
      mc mb --ignore-existing local/rotinapet;
      mc cors set local/rotinapet /cors.json;
      echo 'MinIO bucket rotinapet ready with CORS for localhost:4200'
      "

volumes:
  minio-data:
