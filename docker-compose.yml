services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rotinapet
      POSTGRES_USER: rotinapet
      POSTGRES_PASSWORD: rotinapet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotinapet -d rotinapet && psql -U rotinapet -d rotinapet -tAc \"SELECT 1 FROM pg_available_extensions WHERE name = 'vector'\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    volumes:
      - ./docker/minio/cors.json:/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      i=0;
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        i=$$((i+1));
        if [ $$i -ge 30 ]; then echo 'MinIO não ficou pronto'; exit 1; fi;
        echo 'Aguardando MinIO...';
        sleep 1;
      done;
      mc mb --ignore-existing local/rotinapet;
      mc cors set local/rotinapet /cors.json;
      echo 'MinIO bucket rotinapet ready with CORS for localhost:4200'
      "

volumes:
  postgres-data:
  minio-data:
