name: CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Reject unsupported database paths
        run: |
          if git grep -nE 'com\.h2database|jdbc:h2|db/migration/h2|registerH2|H2Dialect' -- ':!.github/workflows/ci.yml'; then
            echo "Unsupported database-specific path found"
            exit 1
          fi

      - name: Check
        run: ./gradlew check --no-daemon --stacktrace
