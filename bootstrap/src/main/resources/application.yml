spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    locations: classpath:db/migration/common,classpath:db/migration/postgresql

management:
  endpoints:
    web:
      exposure:
        # só o necessário para liveness/readiness de infra e scraping de
        # métricas; env/beans/heapdump vazam detalhe interno sem consumidor
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    # %X{correlationId}: injetado pelo CorrelationIdFilter, permite
    # correlacionar todas as linhas de log de uma mesma requisição.
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId}] %logger{36} - %msg%n"

app:
  ai:
    enabled: ${AI_ENABLED:false}
    rag-enabled: ${AI_RAG_ENABLED:false}
    draft-ttl: ${AI_DRAFT_TTL:PT24H}
    max-input-characters: ${AI_MAX_INPUT_CHARACTERS:4000}
    max-question-characters: ${AI_MAX_QUESTION_CHARACTERS:1000}
    retrieval-limit: ${AI_RETRIEVAL_LIMIT:5}
    index-batch-size: ${AI_INDEX_BATCH_SIZE:10}
    index-max-attempts: ${AI_INDEX_MAX_ATTEMPTS:5}
  storage:
    enabled: ${OBJECT_STORAGE_ENABLED:false}
    endpoint: ${OBJECT_STORAGE_ENDPOINT:${ENDPOINT:${BUCKET_ENDPOINT:${AWS_ENDPOINT_URL:}}}}
    region: ${OBJECT_STORAGE_REGION:${REGION:${BUCKET_REGION:${AWS_DEFAULT_REGION:auto}}}}
    bucket: ${OBJECT_STORAGE_BUCKET:${BUCKET:${BUCKET_NAME:${AWS_S3_BUCKET_NAME:}}}}
    access-key: ${OBJECT_STORAGE_ACCESS_KEY:${ACCESS_KEY_ID:${BUCKET_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}}}
    secret-key: ${OBJECT_STORAGE_SECRET_KEY:${SECRET_ACCESS_KEY:${BUCKET_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}}}
    path-style: ${OBJECT_STORAGE_PATH_STYLE:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
