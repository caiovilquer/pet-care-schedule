server:
  port: ${PORT:8080}
  address: 0.0.0.0
  ssl:
    enabled: false

jwt:
      issuer: ${JWT_ISSUER}
      secret: ${JWT_SECRET}

spring:
  jmx:
    enabled: false
  devtools:
    restart:
      enabled: false
  task:
    scheduling:
      pool:
        size: 2
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:false}
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

app:
  mail:
    from: ${MAIL_FROM}
    from-name: RotinaPet
    base-url: ${MAIL_URL}
    api-key: ${MAIL_KEY}
  frontend:
    base-url: https://rotinapet.vilquer.dev
  security:
    jwt-cache:
      invalidation-skew: ${JWT_INVALIDATION_SKEW:PT2M}
      password-changed-at-check-enabled: ${JWT_PASSWORD_CHANGED_AT_CHECK_ENABLED:true}
  timezone: ${APP_TIMEZONE:America/Sao_Paulo}
