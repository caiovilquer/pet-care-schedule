server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework
  ssl:
    enabled: false
  tomcat:
    threads:
      # padrão é 200 max / 10 min-spare; para o tráfego atual, manter 10
      # threads paradas só consome stack/arena à toa
      max: ${TOMCAT_MAX_THREADS:25}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:2}

jwt:
      issuer: ${JWT_ISSUER}
      secret: ${JWT_SECRET}

spring:
  jmx:
    enabled: false
  devtools:
    restart:
      enabled: false
  task:
    scheduling:
      pool:
        size: 2
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:false}
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      # sem minimum-idle o Hikari mantém o pool sempre cheio (10 conexões
      # abertas em idle, cada uma custando memória aqui e no Postgres);
      # com ele, conexões ociosas são fechadas após idle-timeout (10 min)
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

app:
  storage:
    enabled: ${OBJECT_STORAGE_ENABLED:false}
    endpoint: ${OBJECT_STORAGE_ENDPOINT:${ENDPOINT:${BUCKET_ENDPOINT:${AWS_ENDPOINT_URL:}}}}
    region: ${OBJECT_STORAGE_REGION:${REGION:${BUCKET_REGION:${AWS_DEFAULT_REGION:auto}}}}
    bucket: ${OBJECT_STORAGE_BUCKET:${BUCKET:${BUCKET_NAME:${AWS_S3_BUCKET_NAME:}}}}
    access-key: ${OBJECT_STORAGE_ACCESS_KEY:${ACCESS_KEY_ID:${BUCKET_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}}}
    secret-key: ${OBJECT_STORAGE_SECRET_KEY:${SECRET_ACCESS_KEY:${BUCKET_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}}}
    path-style: ${OBJECT_STORAGE_PATH_STYLE:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://rotinapet.vilquer.dev}
  mail:
    from: ${MAIL_FROM}
    from-name: RotinaPet
    base-url: ${MAIL_URL}
    api-key: ${MAIL_KEY}
  google:
    # Chave de servidor (Web Services), restrita por IP no Google Cloud
    # Console — nunca é enviada ao frontend. Não confundir com a chave do
    # Maps JavaScript usada no browser para renderizar o mapa (essa é
    # restrita por HTTP referrer e configurada só no frontend).
    api-key: ${GOOGLE_API_KEY}
    language: pt-BR
    region: BR
  frontend:
    base-url: ${FRONTEND_BASE_URL:https://rotinapet.vilquer.dev}
  security:
    jwt-cache:
      invalidation-skew: ${JWT_INVALIDATION_SKEW:PT2M}
      password-changed-at-check-enabled: ${JWT_PASSWORD_CHANGED_AT_CHECK_ENABLED:true}
    refresh:
      ttl: ${REFRESH_TTL:P30D}
      cookie:
        name: ${REFRESH_COOKIE_NAME:refresh_token}
        domain: ${REFRESH_COOKIE_DOMAIN:}
        path: /api/v1/auth
        same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
        secure: ${REFRESH_COOKIE_SECURE:true}
  timezone: ${APP_TIMEZONE:America/Sao_Paulo}
