spring:
  datasource:
    url: jdbc:h2:mem:rotinapet;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: localhost
    port: 1025

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:ssl/keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12

jwt:
  issuer: ${JWT_ISSUER:rotinapet-api}
  secret: ${JWT_SECRET:dev-only-change-me-please-32-chars}

springdoc:
  swagger-ui:
    oauth:
      clientId: swagger
      clientSecret: swagger-secret
      scopes: openid,profile,email

app:
  mail:
    from: ${MAIL_FROM}
  google:
    # Sem valor default: as buscas de localização simplesmente falham em dev
    # sem uma chave real (não bloqueia o resto do desenvolvimento local).
    api-key: ${GOOGLE_API_KEY:}
    language: pt-BR
    region: BR
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  security:
    jwt-cache:
      invalidation-skew: ${JWT_INVALIDATION_SKEW:PT2M}
      password-changed-at-check-enabled: ${JWT_PASSWORD_CHANGED_AT_CHECK_ENABLED:true}
    refresh:
      ttl: ${REFRESH_TTL:P30D}
      cookie:
        name: refresh_token
        path: /api/v1/auth
        same-site: Lax
        secure: ${REFRESH_COOKIE_SECURE:true}
  timezone: ${APP_TIMEZONE:America/Sao_Paulo}
