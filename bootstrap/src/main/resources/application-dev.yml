spring:
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/rotinapet}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER:rotinapet}
    password: ${PGPASSWORD:rotinapet}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

  mail:
    host: localhost
    port: 1025

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:ssl/keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12

jwt:
  issuer: ${JWT_ISSUER:rotinapet-api}
  secret: ${JWT_SECRET:dev-only-change-me-please-32-chars}

springdoc:
  swagger-ui:
    oauth:
      clientId: swagger
      clientSecret: swagger-secret
      scopes: openid,profile,email

app:
  ai:
    enabled: ${AI_ENABLED:true}
  seed:
    enabled: true
  mail:
    from: ${MAIL_FROM}
  google:
    # Sem valor default: as buscas de localização simplesmente falham em dev
    # sem uma chave real (não bloqueia o resto do desenvolvimento local).
    api-key: ${GOOGLE_API_KEY:}
    language: pt-BR
    region: BR
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  security:
    jwt-cache:
      invalidation-skew: ${JWT_INVALIDATION_SKEW:PT2M}
      password-changed-at-check-enabled: ${JWT_PASSWORD_CHANGED_AT_CHECK_ENABLED:true}
    refresh:
      ttl: ${REFRESH_TTL:P30D}
      cookie:
        name: refresh_token
        path: /api/v1/auth
        same-site: Lax
        secure: ${REFRESH_COOKIE_SECURE:true}
  timezone: ${APP_TIMEZONE:America/Sao_Paulo}
